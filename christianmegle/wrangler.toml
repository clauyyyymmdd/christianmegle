name = "christianmegle"
main = "worker/index.ts"
compatibility_date = "2024-01-01"

[durable_objects]
bindings = [
  { name = "SIGNALING", class_name = "SignalingRoom" },
  { name = "MATCHMAKER", class_name = "Matchmaker" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SignalingRoom", "Matchmaker"]

[[d1_databases]]
binding = "DB"
database_name = "christianmegle-db"
database_id = "6cf57254-c6ac-475e-be85-42d07544e9af"

[vars]
# No sensitive values here — all secrets use `npx wrangler secret put`:
#   ADMIN_SECRET
#   NOTIFICATION_EMAIL
#   RESEND_API_KEY
#   CF_TURN_KEY_ID
#   CF_TURN_KEY_SECRET
#   ALLOWED_ORIGIN (e.g. "https://christianmegle.com")

# Pages (frontend) — output dir for `npx wrangler pages deploy`
pages_build_output_dir = "dist"

# For local dev, serve the Vite frontend too
[dev]
port = 8787
